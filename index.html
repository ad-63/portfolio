<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>adwitiya@btech-ai:~</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/JetBrains-Mono/2.304/JetBrainsMono-Regular.woff2" as="font">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');

:root{
  --bg:#0a0d0b;
  --panel:#0f1310;
  --border:#1e2a20;
  --text:#cfe3d3;
  --dim:#5f7466;
  --green:#5eff8f;
  --amber:#ffb454;
  --cyan:#6ee7d4;
  --red:#ff6b6b;
}

*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;height:100%;
  background:var(--bg);
  font-family:'JetBrains Mono',monospace;
  color:var(--text);
  overflow:hidden;
}

/* subtle CRT vignette + scanlines */
body::before{
  content:"";
  position:fixed;inset:0;
  pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  z-index:5;
}
body::after{
  content:"";
  position:fixed;inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.018) 0px,
    rgba(255,255,255,0.018) 1px,
    transparent 1px,
    transparent 3px
  );
  z-index:6;
  opacity:.5;
}

#rain{
  position:fixed;inset:0;
  z-index:0;
  opacity:0;
  transition:opacity .6s ease;
  pointer-events:none;
}
#rain.on{opacity:.16;}

.wrap{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:22px clamp(14px,4vw,60px);
}

.titlebar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  background:var(--panel);
  border:1px solid var(--border);
  border-bottom:none;
  border-radius:8px 8px 0 0;
  font-size:12.5px;
  color:var(--dim);
  flex-shrink:0;
}
.dot{width:10px;height:10px;border-radius:50%;background:#2a332c;border:1px solid var(--border);}
.titlebar .path{margin-left:6px;letter-spacing:.02em;}
.titlebar .status{margin-left:auto;color:var(--dim);font-size:11px;}
.status .live{color:var(--green);}

.screen{
  flex:1;
  min-height:0;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:0 0 8px 8px;
  overflow-y:auto;
  padding:20px 22px 14px;
  font-size:14.5px;
  line-height:1.65;
  text-shadow:0 0 6px rgba(94,255,143,0.08);
}
.screen::-webkit-scrollbar{width:9px;}
.screen::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;}
.screen::-webkit-scrollbar-track{background:transparent;}

.line{white-space:pre-wrap;word-break:break-word;margin:0 0 2px;}
.prompt-row{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px;}
.usr{color:var(--green);font-weight:700;}
.at{color:var(--dim);}
.host{color:var(--cyan);font-weight:700;}
.cwd{color:var(--amber);}
.dollar{color:var(--dim);margin-right:2px;}

.dim{color:var(--dim);}
.amber{color:var(--amber);}
.cyan{color:var(--cyan);}
.green{color:var(--green);}
.red{color:var(--red);}
.bold{font-weight:700;}
a{color:var(--cyan);text-decoration:none;border-bottom:1px dashed rgba(110,231,212,.4);}
a:hover{color:var(--amber);border-color:rgba(255,180,84,.5);}

.ascii{
  color:var(--green);
  font-size:11px;
  line-height:1.15;
  white-space:pre;
  margin:4px 0 14px;
  opacity:.9;
}

.tag{
  display:inline-block;
  border:1px solid var(--border);
  color:var(--dim);
  padding:1px 8px;
  border-radius:4px;
  font-size:12px;
  margin:3px 6px 3px 0;
}
.bar-row{display:flex;align-items:center;gap:10px;margin:3px 0;font-size:13px;}
.bar-label{width:150px;flex-shrink:0;color:var(--text);}
.bar-track{flex:1;height:7px;background:#161d18;border-radius:4px;overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));border-radius:4px;}

.proj{
  border-left:2px solid var(--border);
  padding:2px 0 10px 14px;
  margin:8px 0 14px;
}
.proj-title{color:var(--amber);font-weight:700;}
.proj-stack{color:var(--dim);font-size:12.5px;}

form.inputRow{display:flex;align-items:center;gap:6px;margin-top:6px;}
#cmdInput{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-family:inherit;
  font-size:14.5px;
  caret-color:var(--green);
}
.cursor{
  display:inline-block;width:8px;height:16px;background:var(--green);
  animation:blink 1s step-start infinite;vertical-align:-3px;margin-left:2px;
}
@keyframes blink{50%{opacity:0;}}

.hint{color:var(--dim);font-size:12px;margin-top:10px;}

@media (max-width:600px){
  .wrap{padding:10px;}
  .screen{font-size:13px;padding:14px 14px 10px;}
  .bar-label{width:110px;font-size:12px;}
  .ascii{font-size:9px;}
}
</style>
</head>
<body>
<canvas id="rain"></canvas>

<div class="wrap">
  <div class="titlebar">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span class="path">adwitiya@btech-ai: ~</span>
    <span class="status"><span class="live">●</span> online</span>
  </div>
  <div class="screen" id="screen"></div>
</div>

<script>
const screen = document.getElementById('screen');

function println(html, cls){
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' '+cls : '');
  d.innerHTML = html;
  screen.appendChild(d);
  screen.scrollTop = screen.scrollHeight;
  return d;
}

function promptEcho(cmd){
  const row = document.createElement('div');
  row.className = 'prompt-row';
  row.innerHTML = `<span class="usr">adwitiya</span><span class="at">@</span><span class="host">btech-ai</span><span class="dim">:</span><span class="cwd">~</span><span class="dollar">$</span> <span>${cmd}</span>`;
  screen.appendChild(row);
  screen.scrollTop = screen.scrollHeight;
}

async function typeLine(text, cls, speed=10){
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' '+cls : '');
  screen.appendChild(d);
  for(let i=0;i<text.length;i++){
    d.textContent += text[i];
    screen.scrollTop = screen.scrollHeight;
    await new Promise(r=>setTimeout(r, speed));
  }
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

const ASCII = `
  ___      __        _ __  _           
 / _ | ___/ /    __ (_) /_(_)_ _____ _ 
/ __ |/ _  / |/|/ // / __/ / // / _ \`/ 
/_/ |_/\\_,_/|__,__//_/\\__/_/\\_, /\\_,_/  
                            /___/       DHUNGANA
`;

const COMMANDS = {
  help(){
    println(`Available commands:`);
    const rows = [
      ['about','who is adwitiya'],
      ['skills','technical stack + proficiency'],
      ['projects','things built so far'],
      ['education','academic background'],
      ['contact','how to reach me'],
      ['matrix','toggle background rain'],
      ['clear','clear the screen'],
      ['whoami','quick identity check'],
      ['sudo make-tea','try it'],
    ];
    rows.forEach(([c,d])=>{
      println(`  <span class="amber bold">${c.padEnd(16,' ')}</span><span class="dim">${d}</span>`);
    });
  },
  whoami(){
    println(`<span class="green">adwitiya</span> — B.Tech AI student, occasional debugger of gradient descent.`);
  },
  about(){
    println(`<span class="ascii">${ASCII}</span>`);
    println(`<span class="bold">Adwitiya Dhungana</span>`);
    println(`<span class="dim">B.Tech in Artificial Intelligence — building things at the intersection of code and curiosity.</span>`);
    println(``);
    println(`I'm currently studying <span class="cyan">B.Tech AI</span>, learning how machines learn — from`);
    println(`the math underneath neural networks to the messy reality of shipping working code.`);
    println(`This terminal is my portfolio, because a static page felt too quiet for what I actually do all day.`);
  },
  skills(){
    println(`<span class="bold">Skill matrix</span> <span class="dim">(edit values in the code to match you)</span>`);
    const skills = [
      ['Python', 85],
      ['Machine Learning', 70],
      ['Deep Learning / NN', 60],
      ['C / C++', 65],
      ['SQL', 60],
      ['Git & Linux', 75],
    ];
    skills.forEach(([name,pct])=>{
      println(`<div class="bar-row"><span class="bar-label">${name}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span class="dim">${pct}%</span></div>`);
    });
    println(``);
    println(`<span class="tag">Python</span><span class="tag">NumPy</span><span class="tag">Pandas</span><span class="tag">PyTorch</span><span class="tag">scikit-learn</span><span class="tag">Git</span><span class="tag">Linux</span>`);
  },
  projects(){
    println(`<span class="bold">Selected projects</span> <span class="dim">— replace with your real repos</span>`);
    println(`<div class="proj"><div class="proj-title">01. Handwritten Digit Classifier</div><div class="proj-stack">Python · PyTorch · CNN</div>A convolutional neural net trained on MNIST, built to understand backprop from first principles rather than just calling .fit().</div>`);
    println(`<div class="proj"><div class="proj-title">02. Student Grade Predictor</div><div class="proj-stack">Python · scikit-learn · Pandas</div>Regression model estimating exam performance from study habits data — first real end-to-end ML pipeline, from cleaning to evaluation.</div>`);
    println(`<div class="proj"><div class="proj-title">03. This Terminal Portfolio</div><div class="proj-stack">HTML · CSS · vanilla JS</div>Because a portfolio should feel like the tool you actually live in. Type <span class="amber">help</span> to explore it.</div>`);
    println(`<span class="dim">Run <span class="cyan">contact</span> to see how to reach me for the full repo list.</span>`);
  },
  education(){
    println(`<span class="bold">Education</span>`);
    println(`<span class="amber">B.Tech, Artificial Intelligence</span>  <span class="dim">— in progress</span>`);
    println(`<span class="dim">Coursework: data structures & algorithms, linear algebra, probability & statistics,`);
    println(`machine learning, neural networks.</span>`);
  },
  contact(){
    println(`<span class="bold">Contact</span> <span class="dim">— swap these for your real links</span>`);
    println(`<span class="dim">email</span>    <a href="mailto:adwitiya@example.com">adwitiya@example.com</a>`);
    println(`<span class="dim">github</span>   <a href="https://github.com/" target="_blank">github.com/your-username</a>`);
    println(`<span class="dim">linkedin</span> <a href="https://linkedin.com/" target="_blank">linkedin.com/in/your-profile</a>`);
  },
  clear(){
    screen.innerHTML = '';
  },
  matrix(){
    const canvas = document.getElementById('rain');
    canvas.classList.toggle('on');
    println(`<span class="dim">matrix rain ${canvas.classList.contains('on') ? 'enabled' : 'disabled'}.</span>`);
  },
  ls(){
    println(`about.md  skills.json  projects/  education.md  contact.txt`);
  },
  date(){
    println(new Date().toString());
  },
};

const EASTER = {
  'sudo make-tea': ()=> println(`<span class="red">Permission denied:</span> <span class="dim">adwitiya is not in the sudoers file. This incident will be reported (to no one).</span> 🍵`),
  'sudo su': ()=> println(`<span class="red">nice try.</span>`),
  'rm -rf /': ()=> println(`<span class="red">Absolutely not.</span> <span class="dim">This terminal values self-preservation.</span>`),
};

async function boot(){
  const lines = [
    'booting adwitiya@btech-ai ...',
    'loading kernel modules: [curiosity] [caffeine] [pytorch] ... done',
    'mounting /home/adwitiya ... done',
    'starting shell ...',
  ];
  for(const l of lines){
    await typeLine(l, 'dim', 8);
    await sleep(120);
  }
  await sleep(200);
  println(``);
  await typeLine('Welcome. This is an interactive portfolio — type a command below.', 'green', 6);
  println(`<span class="dim">Type <span class="amber">help</span> to see what's available.</span>`);
  println(``);
  COMMANDS.about();
  println(``);
  spawnInput();
}

function spawnInput(){
  const row = document.createElement('form');
  row.className = 'inputRow';
  row.innerHTML = `<span class="usr">adwitiya</span><span class="at">@</span><span class="host">btech-ai</span><span class="dim">:</span><span class="cwd">~</span><span class="dollar">$</span>
    <input id="cmdInput" autocomplete="off" spellcheck="false" autofocus />`;
  screen.appendChild(row);
  screen.scrollTop = screen.scrollHeight;

  const input = row.querySelector('#cmdInput');
  input.focus();
  screen.addEventListener('click', ()=> input.focus());

  const history = [];
  let hIdx = -1;

  row.addEventListener('submit', (e)=>{
    e.preventDefault();
    const raw = input.value;
    const cmd = raw.trim();
    if(!cmd) return;
    row.remove();
    promptEcho(raw);
    history.push(cmd); hIdx = history.length;

    const key = cmd.toLowerCase();
    if(EASTER[key]){
      EASTER[key]();
    } else if(COMMANDS[key]){
      COMMANDS[key]();
    } else {
      println(`<span class="red">command not found:</span> ${cmd}  <span class="dim">— try 'help'</span>`);
    }
    spawnInput();
  });

  input.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(hIdx>0){ hIdx--; input.value = history[hIdx]; }
    } else if(e.key === 'ArrowDown'){
      e.preventDefault();
      if(hIdx<history.length-1){ hIdx++; input.value = history[hIdx]; }
      else { hIdx = history.length; input.value=''; }
    } else if(e.key === 'Tab'){
      e.preventDefault();
      const partial = input.value.toLowerCase();
      const match = Object.keys(COMMANDS).find(c=>c.startsWith(partial));
      if(match) input.value = match;
    }
  });
}

boot();

/* faint matrix rain, toggled via `matrix` command */
const canvas = document.getElementById('rain');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
const chars = 'アイウエオカキクケコ01ABCDEFabtechai';
let drops = [];
function initDrops(){
  const cols = Math.floor(canvas.width/16);
  drops = new Array(cols).fill(0);
}
initDrops();
window.addEventListener('resize', initDrops);
function drawRain(){
  ctx.fillStyle = 'rgba(10,13,11,0.08)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#5eff8f';
  ctx.font = '14px monospace';
  drops.forEach((y,i)=>{
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text, i*16, y);
    if(y>canvas.height && Math.random()>0.975) drops[i]=0;
    else drops[i]=y+16;
  });
  requestAnimationFrame(drawRain);
}
drawRain();
</script>
</body>
</html>
